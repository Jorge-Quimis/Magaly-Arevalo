<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para el Amor de Mi Vida ❤️</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #ff0066, #ff3399);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .San_Valentin {
            position: relative;
            width: 90%;
            max-width: 600px;
            background: #f5e6d3;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 10;
        }
        h1 { color: #cc0066; }
        p { font-size: 18px; color: #444; }
        #contador {
            font-weight: bold;
            font-size: 1.4rem;
            margin-top: 20px;
            color: #cc0066;
        }
        /* Corazón y tronco */
        .tree {
            margin-top: 30px;
            position: relative;
            display: inline-block;
            width: 100px;
            height: 120px;
        }
        .heart {
            width: 80px;
            height: 80px;
            background: red;
            position: relative;
            transform: rotate(-45deg);
            animation: latido 1s infinite;
        }
        .heart:before, .heart:after {
            content: "";
            width: 80px;
            height: 80px;
            background: red;
            border-radius: 50%;
            position: absolute;
        }
        .heart:before { top: -40px; left: 0; }
        .heart:after { left: 40px; top: 0; }
        .trunk {
            width: 15px;
            height: 40px;
            background: #8B4513;
            margin: 0 auto;
            position: relative;
            top: -10px;
        }
        @keyframes latido {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }
        .corazon-flotante {
            position: absolute;
            color: white;
            font-size: 20px;
            bottom: -50px;
            animation: flotar 5s linear infinite;
        }
        @keyframes flotar {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="San_Valentin">
    <h1>Para el amor de mi vida ❤️</h1>
    <p>Si pudiera elegir un lugar seguro, sería a tu lado.</p>
    <p>Cuanto más tiempo estoy contigo más te amo.</p>
    <p>Mi amor por ti comenzó hace...</p>
    <div id="contador">Calculando tiempo...</div>

    <div class="tree">
        <div class="heart"></div>
        <div class="trunk"></div>
    </div>
</div>

<script>
    // FECHA DE INICIO: 21 de Junio de 2025
    const fechaInicio = new Date(2025, 5, 21, 0, 0, 0); 

    function actualizarContador() {
        const ahora = new Date();
        const diferencia = ahora - fechaInicio;

        const d = Math.floor(diferencia / (1000 * 60 * 60 * 24));
        const h = Math.floor((diferencia / (1000 * 60 * 60)) % 24);
        const m = Math.floor((diferencia / (1000 * 60)) % 60);
        const s = Math.floor((diferencia / 1000) % 60);

        document.getElementById("contador").innerHTML = 
            d + " días " + h + " horas " + m + " minutos " + s + " segundos ❤️";
    }

    setInterval(actualizarContador, 1000);
    actualizarContador();

    function crearCorazon() {
        const c = document.createElement("div");
        c.classList.add("corazon-flotante");
