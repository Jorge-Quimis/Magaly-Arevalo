<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para el Amor de Mi Vida ❤️</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #ff007f;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        .San_Valentin {
            background: #fdf5e6;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            text-align: center;
            width: 85%;
            max-width: 500px;
            position: relative;
            z-index: 2;
        }
        h1 { color: #d10069; margin-bottom: 15px; font-size: 1.8rem; }
        p { color: #5d4037; font-size: 1.1rem; margin: 8px 0; }
        #contador {
            font-weight: bold;
            font-size: 1.2rem;
            margin: 20px 0;
            color: #d10069;
            min-height: 1.5em;
        }
        .heart-main {
            width: 80px;
            height: 80px;
            background: red;
            position: relative;
            transform: rotate(-45deg);
            margin: 40px auto 20px;
            animation: latido 1s infinite;
        }
        .heart-main:before, .heart-main:after {
            content: "";
            width: 80px;
            height: 80px;
            background: red;
            border-radius: 50%;
            position: absolute;
        }
        .heart-main:before { top: -40px; left: 0; }
        .heart-main:after { left: 40px; top: 0; }
        .trunk {
            width: 12px;
            height: 35px;
            background: #8B4513;
            margin: 0 auto;
            position: relative;
            z-index: -1;
            top: -10px;
        }
        @keyframes latido {
            0% { transform: rotate(-45deg) scale(1); }
            50% { transform: rotate(-45deg) scale(1.1); }
            100% { transform: rotate(-45deg) scale(1); }
        }
        .corazon-vuelo {
            position: absolute;
            color: white;
            bottom: -50px;
            animation: flotar 5s linear infinite;
        }
        @keyframes flotar {
            from { transform: translateY(0); opacity: 1; }
            to { transform: translateY(-110vh); opacity: 0; }
        }
    </style>
</head>
<body>

<div class="San_Valentin">
    <h1>Para el amor de mi vida ❤️</h1>
    <p>Si pudiera elegir un lugar seguro, sería a tu lado.</p>
    <p>Cuanto más tiempo estoy contigo más te amo.</p>
    <p>Mi amor por ti comenzó hace...</p>
    
    <div id="contador">Cargando...</div>

    <div class="heart-main"></div>
    <div class="trunk"></div>
</div>

<script>
    function actualizarContador() {
        const fechaInicio = new Date('June 21, 2025 00:00:00').getTime();
        const ahora = new Date().getTime();
        const diferencia = ahora - fechaInicio;

        if (isNaN(diferencia)) {
            document.getElementById("contador").innerHTML = "Error en fecha";
            return;
        }

        const d = Math.floor(diferencia / (1000 * 60 * 60 * 24));
        const h = Math.floor((diferencia % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const m = Math.floor((diferencia % (1000 * 60 * 60)) / (1000 * 60));
        const s = Math.floor((diferencia % (1000 * 60)) / 1000);

        document.getElementById("contador").innerHTML = 
            d + " días " + h + " horas " + m + " minutos " + s + " segundos ❤️";
    }

    // Iniciar inmediatamente y luego cada segundo
    actualizarContador();
    setInterval(actualizarContador, 1000);

    // Corazones de fondo
    function crearCorazon() {
        const c = document.createElement("div");
        c.className = "corazon-vuelo";
        c.innerHTML = "❤️";
        c.style.left = Math.random() * 100 + "vw";
        c.style.fontSize = (Math.random() * 20 + 10) + "px";
        c.style.animationDuration = (Math.random() * 3 + 2) + "s";
        document.body.appendChild(c);
        setTimeout(() => { c.remove(); }, 5000);
    }
    setInterval(crearCorazon, 400);
</script>

</body>
</html>
