<script>
// La fecha exacta en que comenzó su amor
// Nota: En JavaScript los meses empiezan en 0 (0=Ene, 5=Jun)
const fechaInicio = new Date(2025, 5, 21, 0, 0, 0); 

function actualizarContador() {
    const ahora = new Date();
    const diferencia = ahora - fechaInicio;

    // Conversiones de tiempo
    const msPorSegundo = 1000;
    const msPorMinuto = msPorSegundo * 60;
    const msPorHora = msPorMinuto * 60;
    const msPorDia = msPorHora * 24;

    // Cálculo de días, horas, minutos y segundos
    const d = Math.floor(diferencia / msPorDia);
    const h = Math.floor((diferencia % msPorDia) / msPorHora);
    const m = Math.floor((diferencia % msPorHora) / msPorMinuto);
    const s = Math.floor((diferencia % msPorMinuto) / msPorSegundo);

    // Mostramos el resultado con el mismo formato que tenías
    document.getElementById("contador").innerHTML = 
        `${d} días ${h} horas ${m} minutos ${s} segundos ❤️`;
}

// Actualizar cada segundo
setInterval(actualizarContador, 1000);
actualizarContador();

// Función de corazones flotando (esta parte de tu código estaba perfecta)
function crearCorazon(){
    const corazon = document.createElement("div");
    corazon.classList.add("corazon");
    corazon.innerHTML = "❤️";
    corazon.style.left = Math.random() * 100 + "vw";
    corazon.style.animationDuration = (3 + Math.random() * 2) + "s";
    document.body.appendChild(corazon);

    setTimeout(() => {
        corazon.remove();
    }, 5000);
}

setInterval(crearCorazon, 500);
</script>
